name: flu2
description: SuwaDerm - Skin Disease Identification and Support Application
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 📷 Image capture
  image_picker: ^1.2.1

  # 🖼 Image processing
  image: ^4.7.2

  # 🧠 TensorFlow Lite model
  tflite_flutter: ^0.12.1

  # 🌐 Open external links (Google search / Maps)
  url_launcher: ^6.3.0

  # ✨ Better fonts
  google_fonts: ^6.2.1

  # 🎬 Animations
  lottie: ^3.1.0

  # 💾 Store data locally (history, answers)
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/skin_disease_model_finetuned.tflite
    - assets/labels.txt